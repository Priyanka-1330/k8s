apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  labels:
    app: myapp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: myapp
  template: 
    meatadata:
      name: mysql-temp
      labels:
        app: myapp
    spec:
      containers:
        - name: mysql-cont
          image: nginx
          ports:
            - name: mysql-port
              containerPort: 3306
          env:
            - name: MYSQL_USER
              value: admin
            - name: MYSQL_PASSWORD
              value: admin123
            - name: MYSQL_DATABASE
              value: studentapps
            - name: MYSQL_ROOT_PASSWORD
              value: root