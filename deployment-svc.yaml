apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deploy
  labels:
    app: myapp
spec:
  replicas: 5
  selector: 
    matchLabels:
      app: myapp
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 1
    template:
      metadata:
        name: my-temp
        labels: 
          app: myapp
      spec:
        containers:
          - name: nagix
            image: nginx:latest
            ports:
              - name: port
                containerPort: 80
...
---
apiVersion: v1
kind: Service
metadata:
  name: my-svc
  labels: 
    app: myapp
spec: 
  type: NodePort
  selector:
    app: myapp
  ports:
    - name: nginx-svc-port
      protocol: TCP
      port: 80
      targetPort: 80