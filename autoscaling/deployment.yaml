apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deployment
  labels: 
    app: myapp
  namespace: hpa
spec: 
  replicas: 1
  selector:
    matchLabels: 
      app: myapp
  template:
    metadata:
      name: my-temp
      labels:
        app: myapp
    spec:
      containrs:
        - name: my-cont
          iamge: nginx:latest
          ports:
            - name: cont-port
              containerPort: 80