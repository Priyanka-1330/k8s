apiVersion: v1
kind: Pod
metadata:
  name: lbpod
  labels: 
    app: lbapp
spec:
  containers:
    - name: lbpod-container
      image: naginx
      ports:
        - name: containerport
          containerPort: 80
...
---
apiVersion: v1
kind: Service
metadata:
  name: lbsvc
  labels: 
    app: lbapp
spec:
  type: LoadBalancer
  selector: 
    app: lbapp
  ports:
  - name: lbsvc-port
    protocol: TCP
    port: 80
    targetPort: 80