apiVersion: v1
kind: Pod 
metadata: 
  name: nppod
  labels:
    app: nodepod
spec:
  containers:
    - name: httpd-container
      image: httpd:latest
      ports:
        - name: httpdport
          containerPort: 80
...
---
apiVersion: v1
kind: Service 
metadata: 
  name: npsvc
  labels: 
    app: npsvc
spec:
  type: NodePort
  selector: 
    app: nodeapp
  ports:
    - name: httpdsvc-port
      protocol: TCP
      port: 80
      targetPort: 80